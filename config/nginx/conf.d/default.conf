# 动态设置转发协议
map $host $forwarded_proto {
    default $scheme;
    class.noda.co.nz "https";
    auth.noda.co.nz "https";
}

# ============================================
# Keycloak 认证服务专用域名
# ============================================
server {
    listen 80;
    server_name auth.noda.co.nz;

    # 客户端最大请求体大小
    client_max_body_size 100M;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Keycloak 根路径
    location / {
        proxy_pass http://keycloak:8080/;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }
}

# ============================================
# 主应用域名
# ============================================
server {
    listen 80;
    server_name localhost class.noda.co.nz;

    # 客户端最大请求体大小
    client_max_body_size 100M;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript
               image/svg+xml;

    # 所有请求代理到 SSR 容器（API + SSR 渲染 + 静态文件）
    location / {
        proxy_pass http://findclass-ssr:3001;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    # Keycloak 认证服务（开发环境）
    location /auth/ {
        proxy_pass http://keycloak:8080/auth/;

        # Keycloak 需要的代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
