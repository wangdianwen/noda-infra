# 动态设置转发协议
map $host $forwarded_proto {
    default $scheme;
    class.noda.co.nz "https";
    auth.noda.co.nz "https";
}

# ============================================
# Keycloak 认证服务专用域名
# ============================================
server {
    listen 80;
    server_name auth.noda.co.nz;

    # 客户端最大请求体大小
    client_max_body_size 100M;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Keycloak 根路径
    location / {
        proxy_pass http://keycloak:8080/;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }
}

# ============================================
# 主应用域名
# ============================================
server {
    listen 80;
    server_name localhost class.noda.co.nz;

    # 客户端最大请求体大小
    client_max_body_size 100M;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript
               image/svg+xml;

    # Findclass 应用前端
    location / {
        proxy_pass http://findclass-web/;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    # Findclass API
    location /api/ {
        proxy_pass http://findclass-api:3001/api/;
        include /etc/nginx/snippets/proxy-common.conf;

        # API 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 前端认证回调页面（React Router 路由）
    location /auth/callback {
        proxy_pass http://findclass-web/;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
