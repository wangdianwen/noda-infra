server {
    listen 80;
    server_name localhost;

    # 开发环境前端构建产物
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理已移至 class.noda.co.nz.conf

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
