# 动态设置转发协议和端口（Cloudflare TLS 终止，内部 HTTP）
map $host $forwarded_proto {
    default $scheme;
    class.noda.co.nz "https";
    auth.noda.co.nz "https";
    noda.co.nz "https";
    www.noda.co.nz "https";
}

map $host $forwarded_port {
    default $server_port;
    class.noda.co.nz "443";
    auth.noda.co.nz "443";
    noda.co.nz "443";
    www.noda.co.nz "443";
}

# ============================================
# Keycloak 认证服务专用域名
# ============================================
server {
    listen 80;
    server_name auth.noda.co.nz noda-infra-nginx;

    # 客户端最大请求体大小
    client_max_body_size 100M;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "ALLOW-FROM https://class.noda.co.nz" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://class.noda.co.nz https://localhost:3001;" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Keycloak 根路径
    location / {
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 5s;
        proxy_next_upstream_tries 2;
        proxy_pass http://keycloak_backend;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }

    # 自定义错误页
    error_page 502 503 /50x.html;
    location = /50x.html {
        root /etc/nginx/errors;
        internal;
    }
}

# ============================================
# 主应用域名
# ============================================
server {
    listen 80;
    server_name localhost class.noda.co.nz noda.co.nz www.noda.co.nz;

    # 客户端最大请求体大小
    client_max_body_size 100M;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript
               image/svg+xml;

    # 管理 API — 仅允许内部访问，外网返回 403
    location /api/admin/ {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json always;
    }

    # 所有请求代理到 SSR 容器（API + SSR 渲染 + 静态文件）
    location / {
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 5s;
        proxy_next_upstream_tries 2;
        proxy_pass http://findclass_backend;
        include /etc/nginx/snippets/proxy-common.conf;

        # SSR Streaming 支持 (Next.js RSC streaming)
        proxy_buffering off;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 自定义错误页
    error_page 502 503 /50x.html;
    location = /50x.html {
        root /etc/nginx/errors;
        internal;
    }
}
