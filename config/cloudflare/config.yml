# Cloudflare Tunnel 配置 - Noda 生产环境
# Tunnel ID: 9cab5df3-a546-48fb-9dc5-eacb48c56ff8

tunnel: 9cab5df3-a546-48fb-9dc5-eacb48c56ff8
credentials-file: /root/.cloudflared/9cab5df3-a546-48fb-9dc5-eacb48c56ff8.json

# 配置文件版本
version: 2

# 指定连接的 Cloudflare 区域（可选）
# region: us

# 日志配置
loglevel: info
# logfile: /dev/stdout

# 入站规则配置
ingress:
  # 主域名 - 指向 Nginx (反向代理)
  - hostname: noda.co.nz
    service: http://noda-nginx:80
  # 管理界面 - Keycloak
  - hostname: keycloak.noda.co.nz
    service: http://noda-keycloak:8080
  # 本地开发
  - hostname: localhost.noda.co.nz
    service: http://noda-nginx:80
  # 健康检查端点
  - hostname: health.noda.co.nz
    service: http://noda-nginx:80
  # 默认规则 - 必须是最后一条
  - service: http_status:404
