# ============================================
# Noda Ops - Supervisord 配置
# ============================================
# 管理多个运维进程：备份 cron + Cloudflare Tunnel
# ============================================

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:cron]
command=/usr/sbin/crond -f -l 2
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/cron.log
stderr_logfile=/var/log/supervisor/cron-error.log
environment=HOME="/root",PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

[program:cloudflared]
command=/usr/local/bin/cloudflared tunnel --no-autoupdate run --token %(ENV_CLOUDFLARE_TUNNEL_TOKEN)s
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/var/log/supervisor/cloudflared.log
stderr_logfile=/var/log/supervisor/cloudflared-error.log
environment=HOME="/root"
# 如果没有配置 CLOUDFLARE_TUNNEL_TOKEN，则不启动
# 通过环境变量控制是否启用
