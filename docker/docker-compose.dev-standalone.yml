# ============================================
# Noda 开发环境配置（独立部署）
# ============================================

name: noda-dev

services:
  # ----------------------------------------
  # PostgreSQL 数据库（开发环境）
  # ----------------------------------------
  postgres-dev:
    image: postgres:17.9
    container_name: noda-dev-postgres
    labels:
      - "noda.service-group=infra"
      - "noda.environment=dev"
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: noda_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - noda-dev-network
    ports:
      - "127.0.0.1:5433:5432"  # 仅本地可访问，避免冲突
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local

networks:
  noda-dev-network:
    driver: bridge
