# ============================================
# Noda Monorepo - Docker Compose 基础配置
# ============================================
# 此文件定义所有共享的服务配置
# 环境特定配置在 docker-compose.dev.yml 和 docker-compose.prod.yml 中覆盖

name: noda-infra

services:
  # ----------------------------------------
  # PostgreSQL 数据库
  # ----------------------------------------
  postgres:
    image: postgres:17.9
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Nginx 反向代理
  # ----------------------------------------
  nginx:
    container_name: noda-infra-nginx
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../config/nginx/snippets:/etc/nginx/snippets:ro
    networks:
      - noda-network
    depends_on:
      - postgres

  # ----------------------------------------
  # Cloudflare Tunnel (生产环境)
  # ----------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # 使用 Token 认证运行 Named Tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - noda-network

  # ----------------------------------------
  # Findclass SSR 服务（API + SSR 渲染 + 静态文件）
  # ----------------------------------------
  findclass-ssr:
    build:
      context: ../../noda-apps
      dockerfile: ./infra/docker/Dockerfile.findclass-ssr
    image: findclass-ssr:latest
    container_name: findclass-ssr
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/noda_prod
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/noda_prod
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: noda
      KEYCLOAK_CLIENT_ID: noda-frontend
    networks:
      noda-network:
        aliases:
          - findclass-ssr
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------
  # Keycloak 认证服务（基础配置）
  # ----------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.3
    ports:
      - "8080:8080"  # HTTP 端口
      - "9000:9000"  # 管理端口（健康检查）
    # 数据库配置（独立数据库架构）
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # 启用 HTTP 模式（开发/内部网络）
      KC_HTTP_ENABLED: "true"
      # Hostname 配置
      KC_HOSTNAME: "auth.noda.co.nz"
      KC_HOSTNAME_PORT: "443"
      KC_HOSTNAME_STRICT: "false"
      # Proxy 配置（Cloudflare Tunnel）
      KC_PROXY: "edge"
      KC_PROXY_HEADERS: "xforwarded"
      # Frontend URL（强制使用 HTTPS）
      KC_FRONTEND_URL: "https://auth.noda.co.nz"
      # 管理员账号
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start
    volumes:
      - ./services/keycloak/themes:/opt/keycloak/themes/noda:ro  # 可选：未来自定义主题
    networks:
      - noda-network
    restart: unless-stopped
    depends_on:
      - postgres

  # ----------------------------------------
  # Noda 数据库备份系统（opdev）
  # ----------------------------------------
  opdev:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backup
    image: noda-backup:latest
    container_name: opdev
    restart: unless-stopped
    environment:
      POSTGRES_HOST: noda-infra-postgres-1
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME:-noda-backups}
      B2_PATH: ${B2_PATH:-backups/postgres/}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      BACKUP_DIR: /tmp/postgres_backups
      HISTORY_DIR: /app/history
    volumes:
      - ./volumes/backup:/tmp/postgres_backups
      - ./volumes/history:/app/history
      - ./volumes/logs:/var/log/noda-backup
    networks:
      - noda-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h noda-infra-postgres-1 -U ${POSTGRES_USER:-postgres} || exit 1"]
      interval: 1h
      timeout: 10s
      retries: 3

# ============================================
# Volumes（数据持久化）
# ============================================
volumes:
  postgres_data:
    driver: local

# ============================================
# Networks（网络隔离）
# ============================================
networks:
  noda-network:
    external: true
    name: noda-network
