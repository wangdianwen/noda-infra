# ============================================
# Noda Monorepo - Docker Compose 基础配置
# ============================================
# 此文件定义所有共享的服务配置
# 环境特定配置在 docker-compose.dev.yml 和 docker-compose.prod.yml 中覆盖

name: noda-infra

services:
  # ----------------------------------------
  # PostgreSQL 数据库
  # ----------------------------------------
  postgres:
    image: postgres:17.9
    container_name: noda-infra-postgres-prod
    labels:
      - "noda.service-group=infra"
      - "noda.environment=prod"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Nginx 反向代理
  # ----------------------------------------
  nginx:
    container_name: noda-infra-nginx
    image: nginx:1.25-alpine
    labels:
      - "noda.service-group=infra"
      - "noda.environment=prod"
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../config/nginx/snippets:/etc/nginx/snippets:ro
    networks:
      - noda-network
    depends_on:
      - postgres

  # ----------------------------------------
  # Noda Ops - 运维工具集（备份 + Cloudflare Tunnel）
  # 合并了旧的 opdev 和 cloudflared 容器
  # ----------------------------------------
  noda-ops:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.noda-ops
    image: noda-ops:latest
    container_name: noda-ops
    labels:
      - "noda.service-group=infra"
      - "noda.environment=prod"
    restart: unless-stopped
    environment:
      # 备份系统配置
      POSTGRES_HOST: noda-infra-postgres-prod
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /tmp/postgres_backups
      HISTORY_DIR: /app/history
      # B2 云存储配置
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME:-noda-backups}
      B2_PATH: ${B2_PATH:-backups/postgres/}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      # SSL 配置（Docker 内部网络无需 SSL）
      PGSSLMODE: disable
      # Cloudflare Tunnel 配置
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./volumes/backup:/tmp/postgres_backups
      - ./volumes/history:/app/history
      - ./volumes/logs:/var/log/noda-backup
    networks:
      - noda-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h noda-infra-postgres-prod -U ${POSTGRES_USER:-postgres} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------
  # Keycloak 认证服务（已迁移到蓝绿部署）
  # 注意：生产环境通过 Jenkins keycloak-deploy Pipeline 管理
  # 容器名为 keycloak-blue / keycloak-green，不使用 compose 启动
  # 此定义仅作为配置参考保留
  # ----------------------------------------
  keycloak:
    profiles:
      - disabled
    image: quay.io/keycloak/keycloak:26.2.3
    container_name: noda-infra-keycloak-prod
    labels:
      - "noda.service-group=infra"
      - "noda.environment=prod"
    # 数据库配置（独立数据库架构）
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # 启用 HTTP 模式（开发/内部网络）
      KC_HTTP_ENABLED: "true"
      # Hostname 配置（v2 SPI - 使用完整 URL）
      KC_HOSTNAME: "https://auth.noda.co.nz"
      KC_HOSTNAME_STRICT: "false"
      # Proxy 配置（Cloudflare Tunnel）
      KC_PROXY: "edge"
      KC_PROXY_HEADERS: "xforwarded"
      # Frontend URL（强制使用 HTTPS）
      KC_FRONTEND_URL: "https://auth.noda.co.nz"
      # 管理员账号
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start
    volumes:
      - ./services/keycloak/themes:/opt/keycloak/themes/noda:ro  # 可选：未来自定义主题
    networks:
      noda-network:
        aliases:
          - keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

# ============================================
# Volumes（数据持久化）
# ============================================
volumes:
  postgres_data:
    driver: local

# ============================================
# Networks（网络隔离）
# ============================================
networks:
  noda-network:
    external: true
    name: noda-network
