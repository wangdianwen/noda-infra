# ============================================
# Noda Monorepo - Docker Compose 生产环境配置
# ============================================
# 此文件覆盖生产环境特定的配置
# 使用方法：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: noda-infra

services:
  # ----------------------------------------
  # PostgreSQL 生产环境配置
  # ----------------------------------------
  postgres:
    # 生产环境不暴露端口，仅通过 Docker 内部网络访问
    environment:
      POSTGRES_DB: noda_prod
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - ./services/postgres/backup:/var/lib/postgresql/backup  # 备份目录
      - ./services/postgres/backup/wal-archive:/var/lib/postgresql/wal_archive  # WAL 归档目录
      - ./services/postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro  # PostgreSQL 配置文件
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s

  # ----------------------------------------
  # Keycloak 认证服务（生产环境）
  # ----------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.3
    labels:
      - "noda.service-group=infra"
    environment:
      # 数据库配置（独立数据库架构）
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # 主机名配置（v2 SPI - 使用完整 URL）
      KC_HOSTNAME: "https://auth.noda.co.nz"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: "edge"
      KC_PROXY_HEADERS: "xforwarded"
      # 启用健康检查
      KC_HEALTH_ENABLED: "true"
      # 管理员账号
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # SMTP 配置（密码重置邮件）
      KC_MAIL_HOST: ${SMTP_HOST}
      KC_MAIL_PORT: ${SMTP_PORT}
      KC_MAIL_FROM: ${SMTP_FROM}
      KC_MAIL_FROM_DISPLAY_NAME: Noda
      KC_SMTP_AUTH: "true"
      KC_SMTP_USER: ${SMTP_USER}
      KC_SMTP_PASSWORD: ${SMTP_PASSWORD}
      KC_SMTP_SSL: "false"
      KC_SMTP_STARTTLS: "true"
    command: start
    volumes:
      - ./services/keycloak/themes:/opt/keycloak/themes/noda:ro  # 可选：未来自定义主题
    networks:
      - noda-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9000 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s

  # ----------------------------------------
  # Findclass SSR（生产环境）
  # ----------------------------------------
  findclass-ssr:
    labels:
      - "noda.service-group=noda-apps"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/noda_prod
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/noda_prod
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: noda
      KEYCLOAK_CLIENT_ID: noda-frontend
      RESEND_API_KEY: ${RESEND_API_KEY}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s

  # ----------------------------------------
  # Nginx 安全加固（生产环境）
  # ----------------------------------------
  nginx:
    volumes:
      - ../config/nginx/errors:/etc/nginx/errors:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s

  # ----------------------------------------
  # Noda Ops 安全加固（生产环境）
  # ----------------------------------------
  noda-ops:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
      - /home/nodaops
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s

# ============================================
# 网络定义
# ============================================
networks:
  noda-network:
    external: true
    name: noda-network
