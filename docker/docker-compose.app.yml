# ============================================
# Noda 应用服务配置
# ============================================
# 包含：noda-apps（API + SSR 渲染 + 静态文件 + 官网页面）
# 旧服务（findclass-web, findclass-api, findclass-ssr）已合并为 noda-apps
#
# 独立于基础设施服务（postgres, keycloak, nginx, noda-ops）
# 通过外部网络 noda-network 连接基础设施
#
# 部署：bash scripts/deploy/deploy-apps-prod.sh

name: noda-apps

services:
  # ----------------------------------------
  # Noda Apps（API + SSR 渲染 + 静态文件）
  # 三合一服务，同时服务 class.noda.co.nz 和 noda.co.nz
  # ----------------------------------------
  noda-apps:
    build:
      context: ../../noda-apps
      dockerfile: ../noda-infra/deploy/Dockerfile.noda-apps
      args:
        NEXT_PUBLIC_KEYCLOAK_URL: https://auth.noda.co.nz
        NEXT_PUBLIC_KEYCLOAK_REALM: noda
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: noda-frontend
    image: noda-apps:latest
    container_name: noda-apps
    labels:
      - "noda.service-group=apps"
      - "noda.environment=prod"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@noda-infra-postgres-prod:5432/noda_prod
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@noda-infra-postgres-prod:5432/noda_prod
      KEYCLOAK_URL: https://auth.noda.co.nz
      KEYCLOAK_INTERNAL_URL: http://noda-infra-nginx
      KEYCLOAK_REALM: noda
      KEYCLOAK_CLIENT_ID: noda-frontend
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 128M
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /app/scripts/logs:uid=1001,gid=1001,mode=0755

networks:
  noda-network:
    external: true
    name: noda-network
