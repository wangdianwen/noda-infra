# ============================================
# Noda 应用服务配置
# ============================================
# 包含：findclass-ssr（API + SSR 渲染 + 静态文件）
# 旧服务（findclass-web, findclass-api）已被 findclass-ssr 替代
#
# 独立于基础设施服务（postgres, keycloak, nginx, noda-ops）
# 通过外部网络 noda-network 连接基础设施
#
# 部署：bash scripts/deploy/deploy-apps-prod.sh

name: noda-apps

services:
  # ----------------------------------------
  # Findclass SSR（API + SSR 渲染 + 静态文件）
  # 三合一服务，替代旧的 web + api 架构
  # ----------------------------------------
  findclass-ssr:
    build:
      context: ../../noda-apps
      dockerfile: ../noda-infra/deploy/Dockerfile.findclass-ssr
      args:
        VITE_KEYCLOAK_URL: https://auth.noda.co.nz
        VITE_KEYCLOAK_REALM: noda
        VITE_KEYCLOAK_CLIENT_ID: noda-frontend
    image: findclass-ssr:latest
    container_name: findclass-ssr
    labels:
      - "noda.service-group=apps"
      - "noda.environment=prod"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@noda-infra-postgres-prod:5432/noda_prod
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@noda-infra-postgres-prod:5432/noda_prod
      KEYCLOAK_URL: https://auth.noda.co.nz
      KEYCLOAK_INTERNAL_URL: http://keycloak-${KEYCLOAK_ACTIVE_ENV:-blue}:8080
      KEYCLOAK_REALM: noda
      KEYCLOAK_CLIENT_ID: noda-frontend
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  # ----------------------------------------
  # NODA Site（静态 Landing Page）
  # 预渲染 HTML + 静态文件服务
  # ----------------------------------------
  noda-site:
    build:
      context: ../../noda-apps
      dockerfile: ../noda-infra/deploy/Dockerfile.noda-site
    image: noda-site:latest
    container_name: noda-site
    labels:
      - "noda.service-group=apps"
      - "noda.environment=prod"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

networks:
  noda-network:
    external: true
    name: noda-network
