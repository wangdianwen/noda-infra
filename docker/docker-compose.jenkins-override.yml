# ============================================
# Jenkins 环境专用配置覆盖
# ============================================
# 此文件覆盖 docker-compose.yml 中的卷挂载路径
# 解决 Docker-in-Docker 的路径映射问题

services:
  # ----------------------------------------
  # Nginx 反向代理 - 使用绝对路径
  # ----------------------------------------
  nginx:
    volumes:
      # 覆盖原有的相对路径，使用 Jenkins 可访问的绝对路径
      - /host-project/noda-infra-config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /host-project/noda-infra-config/nginx/conf.d:/etc/nginx/conf.d:ro
