# ============================================
# Noda Auth App - Docker Compose 配置
# ============================================
# 独立 compose 项目，通过 Jenkins auth-deploy Pipeline 蓝绿部署
# 部署：通过 Jenkins Pipeline 自动管理

name: noda-auth

services:
  noda-auth:
    build:
      context: ../../noda-apps
      dockerfile: ../noda-infra/deploy/Dockerfile.noda-auth
      args:
        NEXT_PUBLIC_KEYCLOAK_URL: https://auth.noda.co.nz
        NEXT_PUBLIC_KEYCLOAK_REALM: noda
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: noda-auth
    image: noda-auth:latest
    container_name: noda-auth
    labels:
      - "noda.service-group=apps"
      - "noda.environment=prod"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_KEYCLOAK_URL: https://auth.noda.co.nz
      NEXT_PUBLIC_KEYCLOAK_REALM: noda
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: noda-auth
      NEXT_PUBLIC_AUTH_APP_URL: https://auth.noda.co.nz
      NEXT_PUBLIC_ALLOWED_ORIGINS: https://class.noda.co.nz,https://noda.co.nz,https://auth.noda.co.nz
      NEXT_PUBLIC_EMAIL_SERVICE_URL: http://email-service:3010
      NEXT_PUBLIC_EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY:-change-me}
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3004/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

networks:
  noda-network:
    external: true
    name: noda-network
