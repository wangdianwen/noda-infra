# ============================================
# Noda 基础设施 - 简化版（只包含不需要构建的服务）
# ============================================

name: noda-infra

services:
  # ----------------------------------------
  # PostgreSQL 生产数据库
  # ----------------------------------------
  postgres:
    image: postgres:17.9
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_me
      POSTGRES_DB: noda_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      noda-network:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # PostgreSQL 开发数据库
  # ----------------------------------------
  postgres-dev:
    image: postgres:17.9
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_me
      POSTGRES_DB: noda_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Nginx 反向代理
  # ----------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../config/nginx/snippets:/etc/nginx/snippets:ro
    networks:
      noda-network:
        aliases:
          - noda-infra-nginx
    depends_on:
      - postgres
      - keycloak

  # ----------------------------------------
  # Keycloak 认证服务
  # ----------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.3
    ports:
      - "8080:8080"
      - "9000:9000"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres_password_change_me
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "auth.noda.co.nz"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_PORT: "443"
      KC_PROXY: "edge"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password_change_me
    command: start
    networks:
      noda-network:
        aliases:
          - keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------
  # Cloudflare Tunnel（自动启用）
  # ----------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - noda-network

volumes:
  postgres_data:
    driver: local
  postgres_dev_data:
    driver: local

networks:
  noda-network:
    external: true
    name: noda-network
