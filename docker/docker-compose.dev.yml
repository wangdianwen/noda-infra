# ============================================
# Noda Monorepo - Docker Compose 开发环境配置
# ============================================
# 此文件覆盖开发环境特定的配置
# 使用方法：docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  # ----------------------------------------
  # PostgreSQL 生产环境（开发环境中也不暴露端口）
  # ----------------------------------------
  postgres:
    # 保持生产 postgres 的初始化脚本（生产数据库）
    # 开发环境不暴露端口
    # 注意：开发数据库已迁移到本地 PostgreSQL（Phase 26）

  # ----------------------------------------
  # Nginx 开发环境配置
  # ----------------------------------------
  nginx:
    ports:
      - "8081:80"  # 本地开发端口（避免与 dozzle 冲突）
    volumes:
      # 开发环境：挂载前端构建产物（热更新）
      - ./apps/noda/frontend/dist:/usr/share/nginx/html:ro

  # ----------------------------------------
  # Cloudflare Tunnel（开发环境禁用）
  # ----------------------------------------
  cloudflared:
    profiles:
      - dev  # 开发环境不启动

  # ----------------------------------------
  # Keycloak 认证服务（开发环境配置）
  # ----------------------------------------
  keycloak:
    environment:
      # 本地开发：不设置 KC_HOSTNAME，允许通过 localhost 访问
      # 使用空字符串覆盖生产配置的 KC_HOSTNAME
      KC_HOSTNAME: ""
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # 本地开发：不使用代理模式
      KC_PROXY: none
      # 启用健康检查
      KC_HEALTH_ENABLED: "true"
      # 确保使用 noda realm
    # 健康检查（使用 TCP 连接检查 HTTP 端口）
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
