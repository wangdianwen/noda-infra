# ============================================
# Noda Monorepo - Docker Compose 开发环境配置
# ============================================
# 此文件覆盖开发环境特定的配置
# 使用方法：docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  # ----------------------------------------
  # PostgreSQL 生产环境（开发环境中也不暴露端口）
  # ----------------------------------------
  postgres:
    # 保持生产 postgres 的初始化脚本（生产数据库）
    # 开发环境不暴露端口

  # ----------------------------------------
  # PostgreSQL 开发环境（独立容器，带种子数据）
  # ----------------------------------------
  postgres-dev:
    image: postgres:17.9
    container_name: noda-infra-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"  # 暴露端口供本地开发连接
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DEV_POSTGRES_DB:-noda_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./services/postgres/init-dev:/docker-entrypoint-initdb.d:ro
    networks:
      - noda-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Nginx 开发环境配置
  # ----------------------------------------
  nginx:
    ports:
      - "8081:80"  # 本地开发端口（避免与 dozzle 冲突）
    volumes:
      # 开发环境：挂载前端构建产物（热更新）
      - ./apps/noda/frontend/dist:/usr/share/nginx/html:ro

  # ----------------------------------------
  # Cloudflare Tunnel（开发环境禁用）
  # ----------------------------------------
  cloudflared:
    profiles:
      - dev  # 开发环境不启动

  # ----------------------------------------
  # Keycloak 认证服务（开发环境配置）
  # ----------------------------------------
  keycloak:
    environment:
      # 本地开发：不设置 KC_HOSTNAME，允许通过 localhost 访问
      # 使用空字符串覆盖生产配置的 KC_HOSTNAME
      KC_HOSTNAME: ""
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # 本地开发：不使用代理模式
      KC_PROXY: none
      # 启用健康检查
      KC_HEALTH_ENABLED: "true"
      # 确保使用 noda realm
    # 健康检查（使用 TCP 连接检查 HTTP 端口）
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----------------------------------------
  # Findclass SSR（开发环境配置）
  # ----------------------------------------
  findclass-ssr:
    # 生产部署不暴露端口（通过 nginx 内部访问）
    # 本地开发需要时使用: docker compose -f ... -p 3002:3001 up findclass-ssr
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/noda_prod
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/noda_prod

  # ----------------------------------------
  # Keycloak 开发环境（独立容器）
  # start-dev 模式：自动禁用主题缓存、放宽 HTTPS 要求
  # ----------------------------------------
  keycloak-dev:
    image: quay.io/keycloak/keycloak:26.2.3
    container_name: noda-infra-keycloak-dev
    labels:
      - "noda.service-group=infra"
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:8080"  # HTTP 开发端口（仅本机，per T-12-01 安全缓解）
      - "127.0.0.1:19000:9000"  # 管理端口（仅本机）
    environment:
      # 数据库：连接 postgres-dev 的 keycloak_dev（与生产完全隔离）
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-dev:5432/keycloak_dev
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # 启用 HTTP（start-dev 自动处理，显式声明确保）
      KC_HTTP_ENABLED: "true"
      # 管理员账号
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    # start-dev：自动禁用主题缓存 + 放宽安全限制（per D-01）
    command: start-dev
    # 读写挂载主题目录（per D-06, D-07）
    # Docker Desktop VirtioFS 无法直接看到深层新建目录，挂载 themes 父目录
    # noda 主题自动出现在 /opt/keycloak/themes/noda/ 下
    volumes:
      - ./services/keycloak/themes:/opt/keycloak/themes
    networks:
      - noda-network
    depends_on:
      postgres-dev:
        condition: service_healthy
    # 健康检查（start-dev 模式下仅监听 8080，不监听 9000 管理端口）
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ============================================
# Volumes（开发环境额外数据卷）
# ============================================
volumes:
  postgres_dev_data:
    driver: local
